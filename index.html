<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Compra do Livro</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  max-width: 400px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
}

input {width: 90%;
  background: #334155;
  color: white;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

textarea {
  width: 100%;
  height: 100px;
  margin-top: 10px;
}

.hidden {
  display: none;
}

.qr {
  margin-top: 15px;
}
</style>
</head>

<body>

<!-- FORM -->
<div class="box" id="telaForm">
  <h2>Comprar Livro</h2>

  <form id="form">
    <input type="text" id="nome" placeholder="Seu nome" required>
    <input type="text" id="whatsapp" placeholder="Seu WhatsApp (com DDD)" required>
    <input type="email" id="email" placeholder="Seu e-mail" required>

    <button type="submit">Ir para pagamento</button>
  </form>
  
  <p style="text-align: left; font-size: 10px;">*Adicione um telefone e e-mail válido, para que possamos entrar em contato.</p>
  
</div>


<!-- PAGAMENTO -->
<div class="box hidden" id="telaPagamento">
  <h2>Pagamento via PIX</h2>

  <p id="dadosCliente"></p>

  <!--<p>Escaneie o QR Code:</p>
  <img id="qrcode" class="qr" width="200">-->
  
   <hr>
      <h3>Sobre o PIX</h3>
      <div class="dados-qrcode">
      <p>Nome:</p><b>DEYVSON JOSE PAULINO DE SOUZA</b></div>
      <div class="dados-qrcode">
      <p>Banco:</p><b>INTER</b></div>
      
  <div id="purchase-history">
    <div class="pix">
      <!--<h1>PIX</h1>-->
      <h1 class="informe-valor">R$ 19,70</h1>
      <p>Escaneie o QR code:</p>
      <img src="qr-code-pix.jpg" style="width:100%;">
     
      

  <p>Ou copie o código:</p>
  <textarea id="pix" readonly></textarea>

  <button onclick="copiarPix()">Copiar PIX</button>

<br />
<br />
   <hr>
  <div id="dados-cliente"></div>

  <button id="btnEnviar">ENVIAR dados para whatsapp</button>
</div>

<script>

// 🔐 VAR TEMPORÁRIA
let dadosCliente = {};

// 🔐 GERAR SENHA
function gerarSenha(tamanho = 8) {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let senha = '';
  for (let i = 0; i < tamanho; i++) {
    senha += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return senha;
}

const PIX = "00020126580014BR.GOV.BCB.PIX011112345678901520400005303986540519.705802BR5925Nome da Loja6009Sao Paulo62070503***6304ABCD";
const WHATSAPP_LOJA = "5581984294752";

// SUBMIT
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const nome = document.getElementById("nome").value;
  const whatsapp = document.getElementById("whatsapp").value.replace(/\D/g, '');
  const email = document.getElementById("email").value;
  const senha = gerarSenha();

  // SALVA TEMPORÁRIO
  dadosCliente = { nome, whatsapp, email, senha };

  // ENVIA PARA SUA LOJA
  const mensagemLoja = `📦 NOVO PEDIDO

👤 Nome: ${nome}
📱 WhatsApp: ${whatsapp}
📧 Email: ${email}
🔐 Senha: ${senha}

📚 Produto: Livro Pai Rico Pai Pobre"
💰 Valor: R$ 19,70

⚠️ Aguardando pagamento via PIX`;

  window.open(`https://wa.me/${WHATSAPP_LOJA}?text=${encodeURIComponent(mensagemLoja)}`, '_blank');

  // IR PARA PAGAMENTO
  setTimeout(() => {
    mostrarPagamento();
  }, 800);
});

// MOSTRAR PAGAMENTO
function mostrarPagamento() {
  const { nome, email, senha } = dadosCliente;

  document.getElementById("telaForm").classList.add("hidden");
  document.getElementById("telaPagamento").classList.remove("hidden");

  document.getElementById("pix").value = PIX;
  /*gerarQRCode(PIX);*/

  document.getElementById("dadosCliente").innerHTML = `
    👤 ${nome}<br>
    📧 ${email}
  `;

  const mensagemCliente = `Olá ${nome}!
Salve seus dados:

Login: ${email}
Senha: ${senha}

Após o pagamento envie o comprovante:
https://wa.me/${WHATSAPP_LOJA}

*O acesso será liberado após a confirmação de pagamento.`;

  document.getElementById("dados-cliente").innerText = mensagemCliente;
}

// 🚀 ENVIAR WHATSAPP PARA CLIENTE
document.getElementById('btnEnviar').addEventListener('click', function() {

  const { nome, email, senha, whatsapp } = dadosCliente;

  const mensagemCliente = `Olá ${nome}!
Salve seus dados:

Login: ${email}
Senha: ${senha}
Página de acesso:
http://seusite.com/login.html

Após o pagamento envie o comprovante:
https://wa.me/${WHATSAPP_LOJA}`;

  window.open(`https://wa.me/55${whatsapp}?text=${encodeURIComponent(mensagemCliente)}`, '_blank');

});

// COPIAR PIX
function copiarPix() {
  const pix = document.getElementById("pix");
  pix.select();
  document.execCommand("copy");
  alert("PIX copiado!");
}

// QR CODE
/*function gerarQRCode(texto) {
  const url = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(texto);
  document.getElementById("qrcode").src = url;
}*/

</script>

</body>
</html>
